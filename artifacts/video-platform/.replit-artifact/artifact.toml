kind = "web"
previewPath = "/"
title = "Video Distribution Platform"
version = "1.0.0"
id = "artifacts/video-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18478

[services.development]
run = "pnpm --filter @workspace/video-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/video-platform", "run", "build" ]
publicDir = "artifacts/video-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18478"
BASE_PATH = "/"
